name: Deploy to GitHub Pages

on:
  push:
    branches: ['claude/modern-edu-architecture-pjhg7s', 'main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site (web)
        run: pnpm --filter @modern-edu/web build
        env:
          GITHUB_PAGES: 'true'

      - name: Add .nojekyll (Next _next/ papkasi uchun)
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
